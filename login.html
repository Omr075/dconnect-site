<!DOCTYPE html>
<html lang="pt">
<meta name="author" content="Daúdo Omar">
    <meta name="description" content="melhor site de APIs e bots em Moçambique">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="api, site, programação">
    <title>mozapi.com/login</title>
    <link rel="stylesheet" href="css/estilo.css">
  </head>
  <body>
    <h3>Faça login na sua conta</h3>
    <form id="login">

    <input
        type="email"
        id="email"
        placeholder="Seu Email"
        required
    >

    <input
        type="password"
        id="password"
        placeholder="Sua senha"
        required
    >

    <button type="submit">
        Entrar
    </button>

</form>

<script src="js/login.js"></script>
  </body>
  </html>
